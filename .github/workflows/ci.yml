name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# The toolchain (channel + rustfmt/clippy components) is pinned in
# rust-toolchain.toml; rustup on the runner auto-installs it on first cargo use.
# Single source of truth — no dtolnay/rust-toolchain step to keep in sync.

jobs:
  # --------------------------------------------------------------------------
  # Format
  # --------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # Clippy (warnings are errors)
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # --------------------------------------------------------------------------
  # Tests. AI calls are mocked (no ANTHROPIC_API_KEY in CI); browser tests run
  # against local fixtures with the runner's preinstalled Chrome and skip when
  # no browser is available.
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # --------------------------------------------------------------------------
  # Docs — catch doc warnings and broken intra-doc links before main.
  # --------------------------------------------------------------------------
  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings
